name: CI

# Syntax / parse / build checks. The data pipeline itself needs Orion and
# the MiCASA + ERA5 archives, so it cannot run here -- but every shell, R,
# and Python file is checked for syntax, and the verify_v2 notebook is
# checked for being in sync with its source-of-truth generator.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python — byte-compile + notebook sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Byte-compile every .py file
        run: |
          set -e
          find . -name '*.py' -print0 | xargs -0 -n1 python -m py_compile
          echo "all Python files compile"
      - name: tests/verify_v2.ipynb is in sync with tests/build_verify_v2.py
        run: |
          if [ ! -f tests/build_verify_v2.py ]; then
            echo "tests/build_verify_v2.py not present (legacy branch) -- skipping"
            exit 0
          fi
          python3 tests/build_verify_v2.py
          if ! git diff --quiet tests/verify_v2.ipynb; then
            echo "::error::tests/verify_v2.ipynb is stale -- run 'python3 tests/build_verify_v2.py' and commit the result"
            git diff --stat tests/verify_v2.ipynb
            exit 1
          fi
          echo "tests/verify_v2.ipynb matches tests/build_verify_v2.py"

  shell:
    name: Shell — bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on every shell script
        run: |
          fail=0
          while IFS= read -r f; do
            echo "checking $f"
            bash -n "$f" || { echo "::error file=$f::bash syntax error"; fail=1; }
          done < <(find . \( -name '*.sh' -o -name '*.sbatch' \) -type f)
          exit $fail

  rlang:
    name: R — parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Parse every R script
        run: |
          fail=0
          while IFS= read -r f; do
            echo "parsing $f"
            Rscript -e 'q(status = tryCatch({ parse(file = commandArgs(TRUE)[1]); 0 }, error = function(e) { message(conditionMessage(e)); 1 }))' "$f" \
              || { echo "::error file=$f::R parse error"; fail=1; }
          done < <(find . \( -name '*.r' -o -name '*.R' \) -type f)
          exit $fail

  tests:
    name: Tests — behavior
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python behavior tests (tests/test_*.py)
        run: |
          if [ ! -d tests ]; then echo "no tests/ dir -- skipping"; exit 0; fi
          python -m pip install --quiet numpy
          fail=0
          for t in tests/test_*.py; do
            [ -e "$t" ] || continue
            echo "== $t =="
            python3 "$t" || { echo "::error file=$t::test failed"; fail=1; }
          done
          exit $fail
      - uses: r-lib/actions/setup-r@v2
      - name: R behavior tests (tests/test_*.r)
        run: |
          if [ ! -d tests ]; then exit 0; fi
          fail=0
          for t in tests/test_*.r; do
            [ -e "$t" ] || continue
            echo "== $t =="
            Rscript "$t" || { echo "::error file=$t::test failed"; fail=1; }
          done
          exit $fail
