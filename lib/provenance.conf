# MiCASA-processing -- provenance & citation constants
# -----------------------------------------------------
# Single source of truth for the citation metadata stamped into every
# netCDF the pipeline writes. Read by lib/provenance.r, lib/provenance.py,
# and the shell stampers (stamp_provenance.sh, cat_monthly.sh).
#
# Format: KEY="VALUE", one per line -- this file is valid POSIX shell (so
# shell scripts can `. lib/provenance.conf`) and is also parsed by a small
# reader in the R and Python helpers. Quote any value containing spaces.
#
#   *** To register the archival DOI and landing page, set MICASA_DOI and
#   *** MICASA_LANDING_PAGE below -- they ship as the literal "PENDING".
#   *** CITATION.cff carries the same DOI and must be updated alongside it.
#   *** (grep -rl PENDING . finds every spot that needs the real values.)

MICASA_PROV_PIPELINE="MiCASA-processing"
MICASA_PROV_PIPELINE_URL="https://github.com/noaa-gml/MiCASA-processing"
MICASA_PROV_INSTITUTION="NOAA Global Monitoring Laboratory"
MICASA_PROV_CREATOR_NAME="NOAA Global Monitoring Laboratory"
MICASA_PROV_CREATOR_URL="https://gml.noaa.gov/ccgg/"
MICASA_PROV_CONVENTIONS="CF-1.10, ACDD-1.3"
MICASA_PROV_LICENSE="U.S. Government Work (public domain, 17 U.S.C. 105)"

# Upstream source dataset (the MiCASA model output this pipeline ingests).
MICASA_UPSTREAM_NAME="MiCASA Land Carbon Flux v1 (NASA GSFC; Weir et al.)"
MICASA_UPSTREAM_DOI="10.5067/ZBXSA1LEN453"
MICASA_UPSTREAM_URL="https://earth.gov/ghgcenter/data-catalog/micasa-carbonflux-grid-v1"

# Archival dataset identifiers -- set these once the record is minted.
MICASA_DOI="PENDING"
MICASA_LANDING_PAGE="PENDING"
